<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Quadcopter PID Tuning Simulator</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div id="app"></div>
    <div id="telemetry-container">
        <canvas id="telemetry-chart"></canvas>
    </div>
    <div id="slam-container">
        <canvas id="slam-map"></canvas>
    </div>
    
    <!-- Gamification HUD -->
    <div id="hud-container" style="display: none;">
        <div id="race-timer">00:00.00</div>
        <div id="ring-counter">Ring: 0 / 0</div>
    </div>

    <!-- Leaderboard Modal -->
    <div id="leaderboard-modal" style="display: none;">
        <h2>Time Trial Leaderboard</h2>
        <ul id="leaderboard-list"></ul>
        <button id="close-leaderboard">Close</button>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
